name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Type-check + unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm test
        env:
          NODE_ENV: test
      - if: always()
        run: npm run coverage || true
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.sha }}
          path: coverage/
          retention-days: 14

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: unit
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: argi
          POSTGRES_PASSWORD: argi
          POSTGRES_DB: argi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U argi"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://argi:argi@localhost:5432/argi_test
      SESSION_SECRET: test-session-secret-do-not-use-in-prod-32-chars
      JWT_SECRET: test-jwt-secret-do-not-use-in-prod-32-chars-long
      NODE_ENV: development
      PORT: 5000
      E2E_BASE_URL: http://localhost:5000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (chromium only)
        run: npx playwright install --with-deps chromium

      - name: Push schema
        run: npm run db:push

      - name: Seed (writes bootstrap-credentials.txt; not used by e2e)
        run: npm run seed || true

      - name: Start server in background
        run: |
          npm run dev &
          echo $! > server.pid

      - name: Wait for /api/health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:5000/api/health >/dev/null 2>&1; then
              echo "Server is up"; exit 0
            fi
            sleep 2
          done
          echo "Server did not respond on /api/health within 120s"
          exit 1

      - name: Run Playwright tests
        run: npx playwright test

      - name: Stop server
        if: always()
        run: |
          if [ -f server.pid ]; then kill $(cat server.pid) || true; fi

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.sha }}
          path: playwright-report/
          retention-days: 14
