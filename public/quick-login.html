<!DOCTYPE html>
<html>
<head>
    <title>Quick Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #667eea;
            color: white;
            padding: 40px;
            text-align: center;
        }
        .box {
            background: white;
            color: #333;
            padding: 40px;
            border-radius: 12px;
            max-width: 500px;
            margin: 0 auto;
        }
        h1 { margin-top: 0; }
        .btn {
            background: #667eea;
            color: white;
            padding: 16px 32px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            margin: 10px;
        }
        .btn:hover { background: #5568d3; }
        #status {
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
            font-size: 16px;
        }
        .info { background: #dbeafe; color: #1e40af; }
        .success { background: #d1fae5; color: #065f46; }
        .error { background: #fee2e2; color: #991b1b; }
        code {
            background: #f3f4f6;
            padding: 4px 8px;
            border-radius: 4px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>🚀 Quick Login</h1>
        
        <div id="status" class="info">
            Click the button below to login automatically
        </div>
        
        <button class="btn" onclick="autoLogin()">
            ⚡ AUTO LOGIN NOW
        </button>
        
        <hr style="margin: 30px 0;">
        
        <h3>Or use these credentials manually:</h3>
        <p><strong>Email:</strong> <code>abel@argilette.com</code></p>
        <p><strong>Password:</strong> <code>admin</code></p>
    </div>

    <script>
        function updateStatus(msg, type) {
            const el = document.getElementById('status');
            el.className = type;
            el.innerHTML = msg;
        }
        
        async function autoLogin() {
            updateStatus('🔄 Logging in...', 'info');
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({
                        email: 'abel@argilette.com',
                        password: 'admin'
                    })
                });
                
                const data = await response.json();
                console.log('Login response:', data);
                
                if (data.success && data.user) {
                    localStorage.setItem('auth_user', JSON.stringify(data.user));
                    localStorage.setItem('user_email', data.user.email);
                    if (data.token) {
                        localStorage.setItem('auth_token', data.token);
                        localStorage.setItem('token', data.token);
                    }
                    
                    updateStatus('✅ Success! Redirecting to dashboard...', 'success');
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1500);
                } else {
                    updateStatus('❌ Login failed: ' + (data.error || 'Unknown error'), 'error');
                }
            } catch (error) {
                updateStatus('❌ Error: ' + error.message, 'error');
                console.error('Login error:', error);
            }
        }
    </script>
</body>
</html>
