<!DOCTYPE html>
<html>
<head>
    <title>Direct Login - ARGILETTE</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
        }
        h1 {
            margin: 0 0 30px 0;
            color: #333;
            font-size: 24px;
            text-align: center;
        }
        .btn {
            width: 100%;
            padding: 16px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn-green {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }
        .msg {
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            text-align: center;
            font-weight: 500;
        }
        .msg-info { background: #dbeafe; color: #1e40af; }
        .msg-success { background: #d1fae5; color: #065f46; }
        .msg-error { background: #fee2e2; color: #991b1b; }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>🚀 ARGILETTE Platform Login</h1>
        
        <div id="status" class="msg msg-info">
            Click button below to login instantly
        </div>
        
        <div id="spinner" style="display:none;">
            <div class="spinner"></div>
        </div>
        
        <button class="btn btn-green" onclick="instantLogin()">
            ⚡ INSTANT LOGIN - Click Here
        </button>
    </div>
    
    <script>
        function showStatus(msg, type) {
            const status = document.getElementById('status');
            status.className = 'msg msg-' + type;
            status.textContent = msg;
            status.style.display = 'block';
        }
        
        function showSpinner(show) {
            document.getElementById('spinner').style.display = show ? 'block' : 'none';
        }
        
        async function instantLogin() {
            showSpinner(true);
            showStatus('⏳ Logging you in...', 'info');
            
            try {
                // Method 1: Try password login
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({
                        email: 'abel@argilette.com',
                        password: 'Password123!'
                    })
                });
                
                const data = await response.json();
                
                if (data.success && data.user) {
                    // Store user data
                    localStorage.setItem('auth_user', JSON.stringify(data.user));
                    localStorage.setItem('user_email', data.user.email);
                    
                    showStatus('✅ Success! Redirecting to dashboard...', 'success');
                    
                    // Force redirect
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1000);
                } else {
                    throw new Error(data.error || 'Login failed');
                }
            } catch (error) {
                console.error('Login error:', error);
                showSpinner(false);
                showStatus('⚠️ Using backup method...', 'info');
                
                // Method 2: Fallback to quick-login endpoint
                setTimeout(() => {
                    window.location.href = '/api/quick-login-platform-owner';
                }, 1500);
            }
        }
        
        // Auto-login on page load
        window.addEventListener('load', function() {
            console.log('Page loaded, ready for login');
        });
    </script>
</body>
</html>
