<!DOCTYPE html>
<html>
<head>
    <title>Debug Login</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #1a1a1a;
            color: #00ff00;
        }
        .box {
            background: #2a2a2a;
            padding: 20px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #00ff00;
        }
        h2 { color: #00ff00; margin-top: 0; }
        button {
            background: #00ff00;
            color: #1a1a1a;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px 5px;
            border-radius: 5px;
        }
        button:hover { background: #00cc00; }
        pre {
            background: #000;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
        }
        .success { color: #00ff00; }
        .error { color: #ff0000; }
        .warning { color: #ffaa00; }
    </style>
</head>
<body>
    <h1>🔍 LOGIN DEBUG TOOL</h1>
    
    <div class="box">
        <h2>Step 1: Clear Everything</h2>
        <button onclick="clearAll()">🧹 CLEAR ALL DATA</button>
        <pre id="clearStatus"></pre>
    </div>
    
    <div class="box">
        <h2>Step 2: Login</h2>
        <button onclick="doLogin()">🔐 LOGIN NOW</button>
        <pre id="loginStatus"></pre>
    </div>
    
    <div class="box">
        <h2>Step 3: Check Storage</h2>
        <button onclick="checkStorage()">📦 CHECK LOCALSTORAGE</button>
        <pre id="storageStatus"></pre>
    </div>
    
    <div class="box">
        <h2>Step 4: Go to Dashboard</h2>
        <button onclick="goToDashboard()">🚀 GO TO DASHBOARD</button>
    </div>
    
    <script>
        function log(id, msg, color = 'success') {
            const el = document.getElementById(id);
            el.innerHTML += '<span class="' + color + '">' + msg + '</span>\n';
        }
        
        function clearAll() {
            const el = document.getElementById('clearStatus');
            el.innerHTML = '';
            
            localStorage.clear();
            sessionStorage.clear();
            log('clearStatus', '✅ localStorage cleared');
            log('clearStatus', '✅ sessionStorage cleared');
            log('clearStatus', '\n✨ All data cleared! Now click LOGIN NOW');
        }
        
        async function doLogin() {
            const el = document.getElementById('loginStatus');
            el.innerHTML = '';
            
            try {
                log('loginStatus', '📡 Sending login request...');
                
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({
                        email: 'abel@argilette.com',
                        password: 'admin'
                    })
                });
                
                log('loginStatus', '📥 Status: ' + response.status);
                
                const data = await response.json();
                log('loginStatus', '📦 Response:\n' + JSON.stringify(data, null, 2));
                
                if (data.success && data.user) {
                    log('loginStatus', '\n✅ LOGIN SUCCESSFUL!', 'success');
                    
                    // Save to localStorage
                    localStorage.setItem('auth_user', JSON.stringify(data.user));
                    localStorage.setItem('user_email', data.user.email);
                    localStorage.setItem('userEmail', data.user.email);
                    
                    if (data.token) {
                        localStorage.setItem('auth_token', data.token);
                        localStorage.setItem('token', data.token);
                        log('loginStatus', '🔑 Token saved: ' + data.token.substring(0, 20) + '...');
                    }
                    
                    log('loginStatus', '💾 Data saved to localStorage');
                    log('loginStatus', '\n✨ Now click CHECK LOCALSTORAGE to verify');
                } else {
                    log('loginStatus', '\n❌ LOGIN FAILED: ' + (data.error || 'Unknown error'), 'error');
                }
            } catch (error) {
                log('loginStatus', '\n❌ ERROR: ' + error.message, 'error');
            }
        }
        
        function checkStorage() {
            const el = document.getElementById('storageStatus');
            el.innerHTML = '';
            
            log('storageStatus', '📦 Checking localStorage...\n');
            
            const authUser = localStorage.getItem('auth_user');
            const userEmail = localStorage.getItem('user_email');
            const token = localStorage.getItem('auth_token') || localStorage.getItem('token');
            
            if (authUser) {
                log('storageStatus', '✅ auth_user found:');
                log('storageStatus', JSON.stringify(JSON.parse(authUser), null, 2));
            } else {
                log('storageStatus', '❌ auth_user NOT found', 'error');
            }
            
            if (userEmail) {
                log('storageStatus', '\n✅ user_email: ' + userEmail);
            } else {
                log('storageStatus', '\n❌ user_email NOT found', 'error');
            }
            
            if (token) {
                log('storageStatus', '\n✅ token: ' + token.substring(0, 30) + '...');
            } else {
                log('storageStatus', '\n⚠️  token NOT found (may be in cookie)', 'warning');
            }
            
            if (authUser && userEmail) {
                log('storageStatus', '\n\n🎉 ALL GOOD! Click GO TO DASHBOARD', 'success');
            } else {
                log('storageStatus', '\n\n⚠️  Data missing! Click LOGIN NOW again', 'warning');
            }
        }
        
        function goToDashboard() {
            const authUser = localStorage.getItem('auth_user');
            if (!authUser) {
                alert('❌ Please login first!');
                return;
            }
            
            console.log('🚀 Redirecting to dashboard...');
            window.location.href = '/dashboard';
        }
        
        // Auto-check storage on load
        setTimeout(checkStorage, 500);
    </script>
</body>
</html>
