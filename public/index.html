    <script>
      // PERMANENT LANDER PREVENTION - Bypasses external DNS parking systems
      (function() {
        const path = window.location.pathname;
        const search = window.location.search;
        const hostname = window.location.hostname;
        
        // IMMEDIATE lander protection - works even if DNS routes to parking
        if (path === '/lander' || path === '/lander/' || path.startsWith('/lander/')) {
          console.log('🛡️ INDEX.HTML PROTECTION: Permanent lander redirect');
          const targetUrl = window.location.origin + '/' + search;
          
          // Multiple redirect methods for bulletproof protection
          try {
            window.location.replace(targetUrl);
          } catch (e) {
            window.location.href = targetUrl;
          }
          return;
        }
        
        // PARKING PAGE DETECTION AND OVERRIDE
        setTimeout(function() {
          const bodyHTML = document.body.innerHTML;
          const headHTML = document.head.innerHTML;
          const fullHTML = document.documentElement.innerHTML;
          
          const isParkingPage = fullHTML.includes('LANDER_SYSTEM') || 
                               fullHTML.includes('parking-lander') ||
                               fullHTML.includes('google.com/adsense/domains') ||
                               fullHTML.includes('wsimg.com') ||
                               fullHTML.includes('traffic_target=gd');
                               
          if (isParkingPage && hostname.includes('argilette.org')) {
            console.log('🚨 PARKING PAGE DETECTED: Emergency override activated');
            window.location.replace('/');
            return;
          }
          
          console.log('✅ NODE CRM: Real application loaded successfully');
        }, 100);
      })();
