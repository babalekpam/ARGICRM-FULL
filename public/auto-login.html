<!DOCTYPE html>
<html>
<head><title>Auto Login</title></head>
<body style="background:#667eea;color:white;font-family:Arial;text-align:center;padding:50px;">
    <h1>🚀 Logging you in...</h1>
    <p id="msg">Please wait...</p>
    <script>
        async function login() {
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    credentials: 'include',
                    body: JSON.stringify({email:'abel@argilette.com',password:'Password123!'})
                });
                const data = await res.json();
                if(data.success) {
                    localStorage.setItem('auth_user', JSON.stringify(data.user));
                    document.getElementById('msg').innerHTML = '✅ Success! Redirecting...';
                    setTimeout(() => window.location.href='/dashboard', 1000);
                } else {
                    document.getElementById('msg').innerHTML = '❌ Error: ' + (data.error||'Failed');
                }
            } catch(e) {
                document.getElementById('msg').innerHTML = '❌ Error: ' + e.message;
            }
        }
        login();
    </script>
</body>
</html>
