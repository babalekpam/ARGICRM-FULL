<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Login - NODE CRM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover { transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
        }
        .error { background: #fee; color: #c00; border: 1px solid #fcc; }
        .success { background: #efe; color: #060; border: 1px solid #cfc; }
        .info { background: #eef; color: #006; border: 1px solid #ccf; }
        .debug {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 12px;
            font-family: monospace;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>NODE CRM</h1>
        <p class="subtitle">Simple Login (Debug Mode)</p>
        
        <div id="message"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email"
                    value="abel@argilette.com"
                    required
                    autocomplete="email"
                >
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password"
                    value="password"
                    required
                    autocomplete="current-password"
                >
            </div>
            
            <button type="submit" id="submitBtn">Sign In</button>
        </form>
        
        <div id="debug" class="debug" style="display:none;"></div>
    </div>

    <script>
        const messageEl = document.getElementById('message');
        const debugEl = document.getElementById('debug');
        const form = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        
        function showMessage(text, type = 'info') {
            messageEl.className = 'message ' + type;
            messageEl.textContent = text;
            messageEl.style.display = 'block';
        }
        
        function log(text) {
            console.log(text);
            debugEl.style.display = 'block';
            debugEl.innerHTML += text + '<br>';
        }
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Signing in...';
            debugEl.innerHTML = '';
            
            log('🔍 Starting login...');
            log('📧 Email: ' + email);
            log('🔑 Password: ' + password);
            log('');
            
            try {
                log('📡 Sending POST to /api/auth/login...');
                
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    credentials: 'include',
                    body: JSON.stringify({ email, password })
                });
                
                log('📥 Status: ' + response.status);
                log('📥 OK: ' + response.ok);
                
                const data = await response.json();
                log('📦 Response: ' + JSON.stringify(data, null, 2));
                
                if (response.ok && data.success) {
                    log('');
                    log('✅ LOGIN SUCCESS!');
                    log('👤 User: ' + data.user.email);
                    log('🎭 Role: ' + data.user.role);
                    
                    showMessage('✅ Login successful! Redirecting...', 'success');
                    
                    // Save to localStorage
                    localStorage.setItem('auth_user', JSON.stringify(data.user));
                    localStorage.setItem('user_email', data.user.email);
                    
                    log('💾 Saved to localStorage');
                    log('🔄 Redirecting to dashboard...');
                    
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1500);
                } else {
                    log('');
                    log('❌ LOGIN FAILED');
                    log('Error: ' + (data.error || data.message || 'Unknown'));
                    showMessage('❌ ' + (data.error || data.message || 'Login failed'), 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Sign In';
                }
            } catch (error) {
                log('');
                log('❌ EXCEPTION: ' + error.message);
                log('Stack: ' + error.stack);
                showMessage('❌ Error: ' + error.message, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign In';
            }
        });
        
        // Auto-focus email
        document.getElementById('email').focus();
    </script>
</body>
</html>
