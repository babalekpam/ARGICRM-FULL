<!DOCTYPE html>
<html>
<head><title>Login Test</title></head>
<body style="font-family:Arial;padding:20px;background:#f0f0f0;">
<h2>Login Diagnostics</h2>
<div id="output" style="background:white;padding:20px;border-radius:8px;"></div>
<script>
const log = (msg) => {
  document.getElementById('output').innerHTML += msg + '<br>';
  console.log(msg);
};

async function testLogin() {
  log('🔍 Testing login...');
  
  const email = 'abel@argilette.com';
  const password = 'Password123!';
  
  log('📧 Email: ' + email);
  log('🔑 Password: ' + password);
  log('');
  
  try {
    log('📡 Sending POST request to /api/auth/login...');
    
    const response = await fetch('/api/auth/login', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      credentials: 'include',
      body: JSON.stringify({ email, password }),
    });
    
    log('📥 Response status: ' + response.status);
    log('📥 Response OK: ' + response.ok);
    
    const data = await response.json();
    log('📦 Response data: ' + JSON.stringify(data, null, 2));
    
    if (data.success) {
      log('');
      log('✅ ✅ ✅ LOGIN SUCCESSFUL! ✅ ✅ ✅');
      log('User: ' + data.user.email);
      log('Role: ' + data.user.role);
      log('');
      log('Saving to localStorage and redirecting...');
      localStorage.setItem('auth_user', JSON.stringify(data.user));
      localStorage.setItem('user_email', data.user.email);
      setTimeout(() => {
        window.location.href = '/dashboard';
      }, 2000);
    } else {
      log('');
      log('❌ LOGIN FAILED');
      log('Error: ' + (data.error || data.message || 'Unknown error'));
    }
  } catch (error) {
    log('');
    log('❌ EXCEPTION OCCURRED');
    log('Error: ' + error.message);
    log('Stack: ' + error.stack);
  }
}

testLogin();
</script>
</body>
</html>
